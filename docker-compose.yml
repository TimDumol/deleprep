services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: deleprep_user
      POSTGRES_PASSWORD: deleprep_password
      POSTGRES_DB: deleprep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://deleprep_user:deleprep_password@db:5432/deleprep_db
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - backend_cache:/root/.cache/uv

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  backend_cache:
